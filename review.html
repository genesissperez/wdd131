<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131-Review Confirmation- Génesis Pérez</title>
    <meta name="description"
        content="Confirmation page that tracks the total number of submitted reviews using localStorage.">
    <meta name="author" content="Genesis Perez">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./styles/form.css">

    <script src="./scripts/review.js" defer></script>
</head>

<body>
    <header>
        <h1> Review Confirmation</h1>
    </header>

    <main>
        <div class="confirmation-section">
            <div class="check-icon">✓</div>

            <h2>Thank You for Your Review!</h2>
            <p class="confirmation-text">Your feedback helps us improve our products.</p>

            <div class="review-counter">
                <p>Total Reviews Submitted: <strong id="counter-display">0</strong></p>
            </div>

            <a href="form.html" class="back-link">← Submit Another Review</a>
        </div>
    </main>

</body>

<footer>

    </p>

</footer>

</html>
